<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAY TUNED — Vote</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: rgba(255, 210, 80, 0.9);
  --gold-glow: rgba(255, 210, 80, 0.25);
  --spain: #c60b1e;
  --spain-glow: rgba(198, 11, 30, 0.4);
  --italy: #008c45;
  --italy-glow: rgba(0, 140, 69, 0.4);
  --white: rgba(255,255,255,0.9);
  --dim: rgba(255,255,255,0.35);
  --bg: #03020a;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  overflow-x: hidden;
  font-family: 'Cormorant Garamond', serif;
  color: var(--white);
}

#space-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.nebula {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 30%, rgba(80,30,120,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(20,60,120,0.3) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 60% 20%, rgba(120,20,60,0.2) 0%, transparent 70%);
}

.vignette {
  position: fixed;
  inset: 0;
  z-index: 2;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(3,2,10,0.75) 100%);
  pointer-events: none;
}

.page {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem 3rem;
  gap: 0;
}

.countdown-wrap {
  text-align: center;
  margin-bottom: 2.5rem;
  animation: fadein 1.5s ease forwards;
  opacity: 0;
}

.countdown-label {
  font-style: italic;
  font-size: 0.75rem;
  letter-spacing: 0.4em;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

.countdown {
  display: flex;
  align-items: flex-start;
  gap: clamp(6px, 2vw, 18px);
  justify-content: center;
}

.cblock {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.cnum {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.2rem, 7vw, 4.5rem);
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 30px var(--gold-glow);
  min-width: clamp(45px, 7vw, 75px);
  text-align: center;
}

.clabel {
  font-style: italic;
  font-size: clamp(0.5rem, 1.2vw, 0.65rem);
  letter-spacing: 0.2em;
  color: var(--dim);
  text-transform: uppercase;
}

.csep {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.8rem, 5vw, 3.5rem);
  color: rgba(255,255,255,0.2);
  margin-top: 2px;
}

.title-wrap {
  text-align: center;
  margin-bottom: 2.5rem;
  animation: fadein 1.5s ease 0.3s forwards;
  opacity: 0;
}

.coords {
  font-style: italic;
  font-size: clamp(0.65rem, 1.5vw, 0.85rem);
  letter-spacing: 0.3em;
  color: var(--dim);
  margin-bottom: 0.6rem;
}

.main-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 12vw, 8rem);
  letter-spacing: 0.12em;
  color: var(--white);
  text-shadow: 0 0 60px rgba(255,255,255,0.1);
  line-height: 1;
}

.pulse-dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--gold);
  margin-left: 8px;
  vertical-align: middle;
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 14px var(--gold-glow);
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.3; transform:scale(0.5); }
}

.divider {
  width: 1px;
  height: 50px;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3), transparent);
  margin: 0 auto 2.5rem;
  animation: fadein 1.5s ease 0.5s forwards;
  opacity: 0;
}

.vote-section {
  width: 100%;
  max-width: 700px;
  animation: fadein 1.5s ease 0.7s forwards;
  opacity: 0;
}

.vote-question {
  text-align: center;
  font-style: italic;
  font-size: clamp(1rem, 3vw, 1.4rem);
  letter-spacing: 0.15em;
  color: var(--dim);
  margin-bottom: 2rem;
}

.vote-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  margin-bottom: 2rem;
}

.vote-btn {
  position: relative;
  border: none;
  cursor: pointer;
  border-radius: 4px;
  overflow: hidden;
  padding: 2rem 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  transition: transform 0.2s ease, box-shadow 0.3s ease;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
}

.vote-btn:hover { transform: translateY(-4px); }
.vote-btn:active { transform: scale(0.97); }

.vote-btn.spain { border-color: rgba(198,11,30,0.4); }
.vote-btn.spain:hover { box-shadow: 0 0 40px var(--spain-glow); border-color: rgba(198,11,30,0.8); }

.vote-btn.italy { border-color: rgba(0,140,69,0.4); }
.vote-btn.italy:hover { box-shadow: 0 0 40px var(--italy-glow); border-color: rgba(0,140,69,0.8); }

.flag {
  font-size: clamp(2.5rem, 8vw, 4rem);
  line-height: 1;
}

.country-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  letter-spacing: 0.15em;
}

.vote-btn.spain .country-name { color: #ff4d5e; text-shadow: 0 0 20px var(--spain-glow); }
.vote-btn.italy .country-name { color: #00cc66; text-shadow: 0 0 20px var(--italy-glow); }

.vote-btn.voted-choice { border-width: 2px; }
.vote-btn.voted-choice.spain { border-color: var(--spain); box-shadow: 0 0 30px var(--spain-glow); }
.vote-btn.voted-choice.italy { border-color: var(--italy); box-shadow: 0 0 30px var(--italy-glow); }

.results {
  display: none;
  flex-direction: column;
  gap: 1rem;
  animation: fadein 0.8s ease forwards;
}

.results.visible { display: flex; }

.result-row {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.result-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  width: 80px;
  flex-shrink: 0;
}

.result-label.spain { color: #ff4d5e; }
.result-label.italy { color: #00cc66; }

.result-bar-wrap {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}

.result-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}

.result-bar.spain { background: linear-gradient(90deg, #c60b1e, #ff4d5e); box-shadow: 0 0 10px var(--spain-glow); }
.result-bar.italy { background: linear-gradient(90deg, #008c45, #00cc66); box-shadow: 0 0 10px var(--italy-glow); }

.result-pct {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.05em;
  width: 45px;
  text-align: right;
  color: var(--dim);
}

.total-votes {
  text-align: center;
  font-style: italic;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  color: rgba(255,255,255,0.2);
  margin-top: 0.25rem;
}

.already-voted-msg {
  display: none;
  text-align: center;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--dim);
  letter-spacing: 0.15em;
  margin-top: 0.5rem;
}

@keyframes fadein {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

#loading {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.6s ease;
}

.spinner {
  width: 40px; height: 40px;
  border: 1px solid rgba(255,210,80,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<canvas id="space-canvas"></canvas>
<div class="nebula"></div>
<div class="vignette"></div>

<div class="page">

  <div class="countdown-wrap">
    <p class="countdown-label">Rendez-vous dans</p>
    <div class="countdown">
      <div class="cblock"><span class="cnum" id="cd-days">00</span><span class="clabel">jours</span></div>
      <div class="csep">:</div>
      <div class="cblock"><span class="cnum" id="cd-hours">00</span><span class="clabel">heures</span></div>
      <div class="csep">:</div>
      <div class="cblock"><span class="cnum" id="cd-mins">00</span><span class="clabel">minutes</span></div>
      <div class="csep">:</div>
      <div class="cblock"><span class="cnum" id="cd-secs">00</span><span class="clabel">secondes</span></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="title-wrap">
    <h1 class="main-title">STAY TUNED<span class="pulse-dot"></span></h1>
  </div>

  <div class="divider"></div>

  <div class="vote-section">
    <p class="vote-question">Où pensez-vous que ça se passe ?</p>

    <div class="vote-buttons" id="vote-buttons">
      <button class="vote-btn spain" onclick="castVote('spain')" id="btn-spain">
        <span class="flag">🇪🇸</span>
        <span class="country-name">Espagne</span>
      </button>
      <button class="vote-btn italy" onclick="castVote('italy')" id="btn-italy">
        <span class="flag">🇮🇹</span>
        <span class="country-name">Italie</span>
      </button>
    </div>

    <p class="already-voted-msg" id="voted-msg">✓ Vous avez déjà voté — résultats en temps réel ci-dessous</p>

    <div class="results" id="results">
      <div class="result-row">
        <span class="result-label spain">🇪🇸 ESP</span>
        <div class="result-bar-wrap"><div class="result-bar spain" id="bar-spain"></div></div>
        <span class="result-pct" id="pct-spain">0%</span>
      </div>
      <div class="result-row">
        <span class="result-label italy">🇮🇹 ITA</span>
        <div class="result-bar-wrap"><div class="result-bar italy" id="bar-italy"></div></div>
        <span class="result-pct" id="pct-italy">0%</span>
      </div>
      <p class="total-votes" id="total-votes">0 vote</p>
    </div>
  </div>

</div>

<script>
(function() {
  const canvas = document.getElementById('space-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [], planets = [], W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 280; i++) {
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.008 + 0.002,
        phase: Math.random() * Math.PI * 2
      });
    }
    planets = [
      { x: W * 0.12, y: H * 0.22, r: 18, color: '#6b4fa0', ring: true, speed: 0.0003 },
      { x: W * 0.88, y: H * 0.75, r: 12, color: '#3a7abf', ring: false, speed: 0.0005 },
      { x: W * 0.75, y: H * 0.18, r: 7,  color: '#bf6a3a', ring: false, speed: 0.0008 },
    ];
  }

  let t = 0;
  function draw() {
    t += 0.016;
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      s.a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });
    planets.forEach((p, i) => {
      const px = p.x + Math.sin(t * p.speed * 60 + i) * 8;
      const py = p.y + Math.cos(t * p.speed * 40 + i) * 5;
      const grd = ctx.createRadialGradient(px, py, 0, px, py, p.r * 3);
      grd.addColorStop(0, p.color + '55');
      grd.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(px, py, p.r * 3, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
      const grad = ctx.createRadialGradient(px - p.r*0.3, py - p.r*0.3, 0, px, py, p.r);
      grad.addColorStop(0, lighten(p.color));
      grad.addColorStop(1, darken(p.color));
      ctx.beginPath();
      ctx.arc(px, py, p.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      if (p.ring) {
        ctx.save();
        ctx.translate(px, py);
        ctx.scale(1, 0.3);
        ctx.beginPath();
        ctx.arc(0, 0, p.r * 1.9, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(160,120,220,0.35)';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.restore();
      }
    });
    requestAnimationFrame(draw);
  }

  function lighten(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
  }
  function darken(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)})`;
  }

  resize(); initStars(); draw();
  window.addEventListener('resize', () => { resize(); initStars(); });
})();
</script>

<script>
(function() {
  var target = new Date("2026-09-01T00:00:00").getTime();
  function update() {
    var diff = Math.max(0, target - Date.now());
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    document.getElementById('cd-days').textContent  = String(d).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
    document.getElementById('cd-mins').textContent  = String(m).padStart(2,'0');
    document.getElementById('cd-secs').textContent  = String(s).padStart(2,'0');
  }
  update();
  setInterval(update, 1000);
})();
</script>

<script>
const STORAGE_KEY = 'staytuned_vote_v1';
const NAMESPACE = 'staytuned-vote-2026-abc7f';

let hasVoted = false;
let userVote = null;

async function fetchCount(key) {
  try {
    const r = await fetch(`https://api.countapi.xyz/get/${NAMESPACE}/${key}`);
    const d = await r.json();
    return d.value || 0;
  } catch { return 0; }
}

async function bumpCount(key) {
  try {
    const r = await fetch(`https://api.countapi.xyz/hit/${NAMESPACE}/${key}`);
    const d = await r.json();
    return d.value || 0;
  } catch { return 0; }
}

async function loadResults() {
  const [s, i] = await Promise.all([fetchCount('spain'), fetchCount('italy')]);
  return { spain: s, italy: i };
}

function renderResults(votes) {
  const total = votes.spain + votes.italy;
  const pctS = total ? Math.round(votes.spain / total * 100) : 0;
  const pctI = total ? Math.round(votes.italy / total * 100) : 0;
  document.getElementById('bar-spain').style.width = pctS + '%';
  document.getElementById('bar-italy').style.width = pctI + '%';
  document.getElementById('pct-spain').textContent = pctS + '%';
  document.getElementById('pct-italy').textContent = pctI + '%';
  document.getElementById('total-votes').textContent =
    total === 0 ? 'Aucun vote' : total === 1 ? '1 vote' : total + ' votes';
  document.getElementById('results').classList.add('visible');
}

function lockButtons(voted) {
  const btnS = document.getElementById('btn-spain');
  const btnI = document.getElementById('btn-italy');
  btnS.disabled = true; btnI.disabled = true;
  btnS.style.opacity = voted === 'spain' ? '1' : '0.35';
  btnI.style.opacity = voted === 'italy' ? '1' : '0.35';
  btnS.style.cursor = 'default'; btnI.style.cursor = 'default';
  if (voted === 'spain') btnS.classList.add('voted-choice');
  if (voted === 'italy') btnI.classList.add('voted-choice');
  document.getElementById('voted-msg').style.display = 'block';
}

async function castVote(choice) {
  if (hasVoted) return;
  hasVoted = true;
  userVote = choice;
  localStorage.setItem(STORAGE_KEY, choice);
  lockButtons(choice);
  await bumpCount(choice);
  const votes = await loadResults();
  renderResults(votes);
  startPolling();
}

function startPolling() {
  setInterval(async () => {
    const votes = await loadResults();
    renderResults(votes);
  }, 5000);
}

(async function init() {
  const prev = localStorage.getItem(STORAGE_KEY);
  if (prev === 'spain' || prev === 'italy') {
    hasVoted = true;
    userVote = prev;
    lockButtons(prev);
    const votes = await loadResults();
    renderResults(votes);
    startPolling();
  }
  const loader = document.getElementById('loading');
  loader.style.opacity = '0';
  setTimeout(() => loader.style.display = 'none', 600);
})();
</script>

</body>
</html>
